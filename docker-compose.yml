services:
  mysql:
    image: mysql:8
    container_name: hr-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: hr
    ports:
      - "3306:3306"
    volumes:
      - ./HR_system/hr_sample.sql:/docker-entrypoint-initdb.d/01-hr_sample.sql
      - hr_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: ./HR_system
    container_name: hr-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hr?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
    ports:
      - "8000:8000"

volumes:
  hr_mysql_data:
